<svg width="100%" viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ECHO chat app logo</title>
<desc>Solid core plus two rings, equal colored and white band widths</desc>
<defs>
  <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1e1b6e"/>
    <stop offset="50%" stop-color="#3b4fd8"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>
</defs>
<g transform="translate(230,230)">
  <circle cx="0" cy="0" r="45"    fill="url(#g1)"/>
  <circle cx="0" cy="0" r="112.5" fill="none" stroke="url(#g1)" stroke-width="45"/>
  <circle cx="0" cy="0" r="202.5" fill="none" stroke="url(#g1)" stroke-width="45"/>
</g>
</svg>
