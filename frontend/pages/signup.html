<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECHO - signup</title>
    <link rel="icon" type="image/svg+xml" href="/frontend/assets/logo/logo.svg">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<div id="app">
    <div class="container page-auth">
        <div class="auth-from">
            <div class="logo">
                <svg viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg" role="img">
                    <title>ECHO chat app logo</title>
                    <desc>Solid core plus two rings, equal colored and white band widths</desc>
                    <defs>
                        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#1e1b6e"/>
                            <stop offset="50%" stop-color="#3b4fd8"/>
                            <stop offset="100%" stop-color="#7c3aed"/>
                        </linearGradient>
                    </defs>
                    <g transform="translate(230,230)">
                        <circle cx="0" cy="0" r="45" fill="url(#g1)"/>
                        <circle cx="0" cy="0" r="112.5" fill="none" stroke="url(#g1)" stroke-width="45"/>
                        <circle cx="0" cy="0" r="202.5" fill="none" stroke="url(#g1)" stroke-width="45"/>
                    </g>
                </svg>
            </div>
            <h1>
                ECHO
            </h1>
            <form action="#" autocomplete="off" class="form">
                <div class="input-group">
                    <input type="text" autocomplete="off" id="name" placeholder=" " class="input-field">
                    <label for="name" class="input-label">Name</label>
                </div>
                <div class="input-group">
                    <input type="text" autocomplete="off" id="username" placeholder=" " class="input-field">
                    <label for="username" class="input-label">Username</label>
                </div>
                <div class="input-group">
                    <input type="email" autocomplete="off" id="email" placeholder=" " class="input-field">
                    <label for="email" class="input-label">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" autocomplete="off" id="password" placeholder=" " class="input-field">
                    <label for="password" class="input-label">Password</label>
                </div>
                <div class="input-group">
                    <input type="password" autocomplete="off" id="re-password" placeholder=" " class="input-field">
                    <label for="re-password" class="input-label">Confirm Password</label>
                </div>
                <button type="submit" class="btn btn-block btn-primary">
                    Sign Up
                </button>
            </form>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
